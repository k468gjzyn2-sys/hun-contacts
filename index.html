<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>선생님 손가락 보호 구역 — Only Galmuri</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* 디자인 시스템 */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F5F7; --surface: #FFFFFF; --surface2: #F5F5F7; --border: #E0E0E5;
  --tx: #1D1D1F; --tx2: #6E6E73; --tx3: #AEAEB2;
  --accent: #FF9E00; --accent-bg: #FFF7E6; --accent-dk: #E08800;
  --radius: 18px; --radius-sm: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.07), 0 0 0 0.5px rgba(0,0,0,.06);
}
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--tx); -webkit-font-smoothing: antialiased; }

/* 헤더 */
.header { text-align: center; margin-bottom: 40px; }
.badge { display: inline-block; padding: 5px 14px; background: var(--tx); color: #fff; font-size: 10px; font-weight: 700; border-radius: 100px; margin-bottom: 16px; letter-spacing: 0.1em; }
.title { font-size: 36px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 8px; line-height: 1.15; }
.title span { color: var(--accent); }
.desc { font-size: 15px; font-weight: 300; color: var(--tx2); display: flex; align-items: center; justify-content: center; gap: 8px; }
.sample-link { font-size: 12px; color: var(--accent); text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 3px; transition: opacity .2s; font-weight: 500; }

/* 카드 및 드롭존 */
.wrap { width: 100%; max-width: 500px; }
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.dz { position: relative; padding: 60px 30px; text-align: center; cursor: pointer; transition: background .25s ease; user-select: none; }
.dz:hover { background: #FAFAFA; }
.dz.drag { background: var(--accent-bg); }
.dz-border { position: absolute; inset: 12px; border: 1.5px dashed var(--border); border-radius: calc(var(--radius) - 6px); pointer-events: none; opacity: 0; transition: opacity .25s; }
.dz:hover .dz-border { opacity: 1; }
.dz.drag .dz-border { opacity: 1; border-color: var(--accent); }

/* 결과창 및 미리보기 */
.stats { display: flex; gap: 8px; margin: 20px 0; }
.stat { background: var(--surface2); padding: 12px; border-radius: var(--radius-sm); flex: 1; text-align: center; }
.stat-n { font-size: 22px; font-weight: 700; color: var(--tx); }
.stat-l { font-size: 10px; color: var(--tx3); margin-top: 2px; }
.preview-list { background: var(--surface2); border-radius: var(--radius-sm); max-height: 180px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.03); margin-top: 10px; }
.preview-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
.preview-item.warn-row { background: #FFFBF2; }
.p-role { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #fff; color: var(--tx2); border: 1px solid var(--border); }
.p-role.student { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
.p-role.warning { color: #fff; border-color: var(--accent); background: var(--accent); font-weight: 600; }

/* 진행바 */
.prog-track { width: 100%; height: 4px; background: var(--border); border-radius: 100px; overflow: hidden; margin-top: 15px; }
.prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s; }

.btn { display: inline-flex; align-items: center; padding: 12px 28px; background: var(--accent); color: #fff; border-radius: 100px; border: none; cursor: pointer; font-weight: 600; margin-top: 12px; }
.btn-ghost { background: transparent; color: var(--tx2); border: 1px solid var(--border); }
#fileInput { display: none; }
.foot { margin-top: 40px; font-size: 10px; color: var(--tx3); letter-spacing: 0.05em; }
</style>
</head>
<body>

<div class="header">
  <div class="badge">Only Galmuri</div>
  <h1 class="title">선생님 손가락 <span>보호 구역</span></h1>
  <p class="desc">수십 명의 번호, 일일이 치지 말고 드래그 한 번으로 저장하세요 <span style="color:var(--border)">|</span> <a class="sample-link" onclick="downloadSample(event)">샘플 받기</a></p>
</div>

<div class="wrap">
  <div class="card">
    <div class="dz" id="dz">
      <div class="dz-border"></div>
      <div id="view-idle">
        <div style="font-size:17px; font-weight:600; margin-bottom:6px;">여기에 엑셀 파일을 놓아주세요</div>
        <div style="font-size:13px; color:var(--tx3);">모든 시트를 자동으로 통합하여 변환합니다.</div>
      </div>
      <div id="view-proc" style="display:none;">
        <div style="font-size:14px; font-weight:500;">연락처 분석 중…</div>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
        <div id="prog-count" style="font-size:12px; color:var(--tx3); margin-top:8px;">0 / 0 행</div>
      </div>
      <div id="view-done" style="display:none;">
        <div style="font-size:18px; font-weight:700; margin-bottom:4px;">변환 완료 🎉</div>
        <div id="done-filename" style="font-size:12px; color:var(--tx3); margin-bottom:16px;"></div>
        <div class="stats">
          <div class="stat"><div class="stat-n" id="stat-total">0</div><div class="stat-l">전체 건수</div></div>
          <div class="stat"><div class="stat-n" id="stat-student">0</div><div class="stat-l">학생</div></div>
          <div class="stat"><div class="stat-n" id="stat-parent">0</div><div class="stat-l">학부모</div></div>
        </div>
        <div class="preview-area" style="text-align:left;">
          <div id="warn-label" style="font-size:11px; font-weight:700; color:var(--accent); margin-bottom:8px; display:none;">⚠️ 별도 저장 필요 확인</div>
          <div class="preview-list" id="preview-list"></div>
          <div style="margin-top:10px; padding:10px; background:var(--accent-bg); border-radius:8px; font-size:11px; color:var(--tx2); line-height:1.5;">
            💡 미리보기는 최대 100개만 표시됩니다. <strong>가져오기 클릭 시 전체 인원이 정상 저장됩니다.</strong>
          </div>
        </div>
        <button class="btn btn-ghost" onclick="location.reload()">새 파일 변환</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls,.csv"/>
<div class="foot">DESIGNED BY HUN · 2026</div>

<script>
// 컬럼 감지 후보
const CANDIDATES = {
  name: ['학생명', '성명', '이름', '학생이름'],
  student: ['학생핸드폰', '학생번호', '학생연락처', '핸드폰', '연락처'],
  parent: ['학부모핸드폰', '학부모번호', '부모핸드폰', '부모번호', '보호자번호']
};

const dz = document.getElementById('dz');
const fileInput = document.getElementById('fileInput');

dz.onclick = () => fileInput.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag'); };
dz.ondragleave = () => dz.classList.remove('drag');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); };
fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); fileInput.value = ''; };

function downloadSample(e) {
  e.stopPropagation();
  const ws = XLSX.utils.aoa_to_sheet([['학생명', '학생핸드폰', '학부모핸드폰'], ['홍길동', '010-1234-5678', '010-1111-2222'], ['성춘향', '010-2222-3333', '010-4444-5555 / 010-6666-7777']]);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Sample');
  XLSX.writeFile(wb, 'Galmuri_Contact_Sample.xlsx');
}

function normTel(v) { return String(v ?? '').replace(/[^0-9]/g, ''); }

function handleFile(file) {
  if (!file) return;
  document.getElementById('view-idle').style.display = 'none';
  document.getElementById('view-proc').style.display = 'block';
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
    let allRows = [];
    wb.SheetNames.forEach(name => {
      const raw = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, defval:''});
      const hi = raw.findIndex(r => r.some(c => CANDIDATES.name.includes(String(c).trim())));
      if (hi === -1) return;
      const headers = raw[hi].map(c => String(c).trim());
      raw.slice(hi + 1).forEach(r => {
        const row = {}; headers.forEach((h, i) => row[h] = r[i]); allRows.push(row);
      });
    });
    processData(allRows, file.name.split('.')[0]);
  };
  reader.readAsArrayBuffer(file);
}

function processData(rows, base) {
  let sc = 0, pc = 0, wc = 0, cards = [];
  const preview = document.getElementById('preview-list');
  preview.innerHTML = '';

  rows.forEach((row, i) => {
    setTimeout(() => {
      const h_name = CANDIDATES.name.find(k => row[k]);
      const h_student = CANDIDATES.student.find(k => row[k]);
      const h_parent = CANDIDATES.parent.find(k => row[k]);
      
      const name = row[h_name];
      if (!name) return;

      const sTel = normTel(row[h_student]);
      const pRaw = String(row[h_parent] ?? '').split(/[/,]/).map(v => normTel(v)).filter(v => v.length >= 9);

      if (sTel) {
        cards.push(`BEGIN:VCARD\r\nVERSION:3.0\r\nFN;CHARSET=UTF-8:${name}\r\nN;CHARSET=UTF-8:;${name};;;\r\nTEL;TYPE=CELL:${sTel}\r\nEND:VCARD`);
        sc++;
        if (sc + pc + wc <= 100) addPreview(name, sTel, '학생', 'student');
      }

      if (pRaw.length >= 2) {
        wc++;
        addPreview(name, pRaw.join(' / '), '별도 저장 필요', 'warning', true);
      } else if (pRaw[0]) {
        cards.push(`BEGIN:VCARD\r\nVERSION:3.0\r\nFN;CHARSET=UTF-8:${name} 부모님\r\nN;CHARSET=UTF-8:;${name} 부모님;;;\r\nTEL;TYPE=CELL:${pRaw[0]}\r\nEND:VCARD`);
        pc++;
        if (sc + pc + wc <= 100) addPreview(name + ' 부모님', pRaw[0], '학부모', 'parent');
      }

      const pct = Math.round(((i + 1) / rows.length) * 100);
      document.getElementById('prog-fill').style.width = pct + '%';
      document.getElementById('prog-count').textContent = `${i + 1} / ${rows.length} 행`;
      if (i === rows.length - 1) finish(cards, sc, pc, wc, base);
    }, i * 2);
  });
}

function addPreview(name, tel, role, cls, warn = false) {
  const div = document.createElement('div');
  div.className = 'preview-item' + (warn ? ' warn-row' : '');
  div.innerHTML = `<span>${warn ? '⚠️ ' : ''}${name} <small style="color:var(--tx3); margin-left:5px;">${tel}</small></span><span class="p-role ${cls}">${role}</span>`;
  document.getElementById('preview-list').appendChild(div);
}

function finish(cards, sc, pc, wc, base) {
  if (cards.length) {
    const blob = new Blob(['\uFEFF' + cards.join('\r\n\r\n')], {type:'text/vcard;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${base}_갈무리.vcf`; a.click();
  }
  document.getElementById('stat-total').textContent = sc + pc;
  document.getElementById('stat-student').textContent = sc;
  document.getElementById('stat-parent').textContent = pc;
  if (wc > 0) {
    const wl = document.getElementById('warn-label');
    wl.textContent = `⚠️ 별도 저장 필요: ${wc}건`; wl.style.display = 'block';
  }
  document.getElementById('done-filename').textContent = `${base}_갈무리.vcf`;
  document.getElementById('view-proc').style.display = 'none';
  document.getElementById('view-done').style.display = 'block';
}
</script>
</body>
</html>
